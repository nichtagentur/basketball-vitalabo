<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<title>VITALABO HOOPS</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#05060a;font-family:'Courier New',monospace;color:#ffb84d;cursor:crosshair}
  canvas{display:block;position:absolute;inset:0}
  .hud{position:fixed;padding:12px 20px;border:1px solid #ffb84d;background:rgba(5,6,10,.6);text-shadow:0 0 8px #ff7a18;letter-spacing:2px;font-size:12px;z-index:2}
  #score{top:20px;left:20px}
  #score b{display:block;font-size:36px;color:#fff;text-shadow:0 0 14px #ff7a18;letter-spacing:4px;font-family:Arial Black,sans-serif}
  #timer{top:20px;left:50%;transform:translateX(-50%);text-align:center}
  #timer b{display:block;font-size:32px;color:#fff;text-shadow:0 0 14px #ff3d00;font-family:Arial Black,sans-serif}
  #combo{top:20px;right:20px;text-align:right}
  #combo b{display:block;font-size:30px;color:#ffe28a;text-shadow:0 0 12px #ff7a18;font-family:Arial Black,sans-serif}
  #brand{bottom:20px;left:20px;line-height:1.6;border-color:#ff3d00}
  #brand b{color:#fff;font-size:18px;letter-spacing:6px;text-shadow:0 0 12px #ff3d00}
  #brand span{color:#6ad2ff}
  #help{bottom:20px;right:20px;line-height:1.7;text-align:right;max-width:240px}
  #help b{color:#fff}
  #power{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);width:340px;height:14px;border:1px solid #ffb84d;background:rgba(5,6,10,.6);z-index:2}
  #powerfill{height:100%;width:0%;background:linear-gradient(90deg,#6ad2ff,#ffe28a,#ff7a18,#ff1744);transition:width .03s linear}
  #toast{position:fixed;top:32%;left:50%;transform:translate(-50%,-50%);font-size:56px;color:#fff;text-shadow:0 0 24px #ff7a18,0 0 60px #ff1744;letter-spacing:8px;opacity:0;transition:opacity .2s;font-weight:900;font-family:Arial Black,sans-serif;z-index:3;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="score" class="hud">SCORE<b id="sv">0</b></div>
<div id="timer" class="hud">TIME<b id="tv">60</b></div>
<div id="combo" class="hud">COMBO<b id="cv">x1</b></div>
<div id="brand" class="hud"><b>VITALABO</b><br>HOOPS // <span>FUEL YOUR GAME</span></div>
<div id="help" class="hud"><b>HOLD</b> mouse = charge<br><b>MOVE</b> mouse = aim<br><b>RELEASE</b> = shoot<br>grab <span style="color:#6ad2ff">supplements</span></div>
<div id="power"><div id="powerfill"></div></div>
<div id="toast"></div>

<script>
(() => {
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
let W=0,H=0;
function resize(){ W=cvs.width=innerWidth*devicePixelRatio; H=cvs.height=innerHeight*devicePixelRatio; cvs.style.width=innerWidth+'px'; cvs.style.height=innerHeight+'px'; ctx.lineCap='round'; ctx.lineJoin='round'; }
resize(); addEventListener('resize',resize);

// === colors ===
const ORANGE='#ff7a18', HOT='#ff1744', AMBER='#ffb84d', CYAN='#6ad2ff', GOLD='#ffe28a', VIOLET='#b967ff', LIME='#9affc7';

// === camera / projection ===
const cam = { x:0, y:5.5, z:18, fov:1.2 };
let camShake=0, camSwayT=0;

// project a 3D world point to 2D screen coords. returns [x, y, scale, z] or null if behind cam.
function proj(x,y,z){
  // sway camera slightly
  const cx = cam.x + Math.sin(camSwayT*0.4)*1.2;
  const cy = cam.y + Math.sin(camSwayT*0.6)*0.25;
  const cz = cam.z;
  // shake
  let sx=0,sy=0;
  if (camShake>0){ sx=(Math.random()-0.5)*camShake*30; sy=(Math.random()-0.5)*camShake*30; }
  const dx = x - cx;
  const dy = y - cy;
  const dz = cz - z;     // looking toward -z; cz - z must be positive
  if (dz < 0.3) return null;
  const f = (H * 0.55) / (dz * cam.fov);
  const px = W/2 + dx * f + sx;
  // tilt cam slightly down toward y=3
  const py = H*0.58 - (dy - 3) * f + sy;
  return [px, py, f, dz];
}

function line3(a,b,color,width=2,alpha=1){
  const p1 = proj(a[0],a[1],a[2]);
  const p2 = proj(b[0],b[1],b[2]);
  if (!p1||!p2) return;
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(p1[0],p1[1]);
  ctx.lineTo(p2[0],p2[1]);
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function circle3(cx,cy,cz, r, axis, color, segs=32, alpha=1, width=2){
  // axis: 'y' => circle in XZ plane, 'x' => YZ, 'z' => XY
  let prev=null;
  for (let i=0;i<=segs;i++){
    const a = i/segs*Math.PI*2;
    let x=cx,y=cy,z=cz;
    if (axis==='y'){ x+=Math.cos(a)*r; z+=Math.sin(a)*r; }
    else if (axis==='x'){ y+=Math.cos(a)*r; z+=Math.sin(a)*r; }
    else { x+=Math.cos(a)*r; y+=Math.sin(a)*r; }
    const p = proj(x,y,z);
    if (prev && p){
      ctx.globalAlpha=alpha; ctx.strokeStyle=color; ctx.lineWidth=width;
      ctx.shadowColor=color; ctx.shadowBlur=10;
      ctx.beginPath(); ctx.moveTo(prev[0],prev[1]); ctx.lineTo(p[0],p[1]); ctx.stroke();
    }
    prev = p;
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0;
}

function box3(cx,cy,cz, w,h,d, rotY, color, alpha=1, width=2){
  // 8 corners
  const c = [
    [-w,-h,-d],[w,-h,-d],[w,h,-d],[-w,h,-d],
    [-w,-h, d],[w,-h, d],[w,h, d],[-w,h, d]
  ].map(([x,y,z])=>{
    const cosR=Math.cos(rotY||0), sinR=Math.sin(rotY||0);
    const xr = x*cosR - z*sinR;
    const zr = x*sinR + z*cosR;
    return [cx+xr, cy+y, cz+zr];
  });
  const edges=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
  for (const [i,j] of edges) line3(c[i],c[j],color,width,alpha);
}

// === game state ===
const game = window._g = {
  score:0, combo:1, time:60, running:true,
  charging:false, power:0,
  mouseX:0, mouseY:0,
  ball:{ x:0, y:1.4, z:8, px:0, py:1.4, pz:8, vx:0,vy:0,vz:0, flying:false, rot:0 },
  trail: [],
  popups: [],
  sparks: [],
  supps: [],
};

const RIM = { x:0, y:6.4, z:-10, r:0.62 };
const BALL_START = {x:0,y:1.4,z:8};

// === supplements ===
const SUPP_TYPES = [
  {name:'PROTEIN', color:CYAN,   val:2},
  {name:'BCAA',    color:GOLD,   val:1},
  {name:'CREATIN', color:HOT,    val:3},
  {name:'VITAMIN', color:LIME,   val:1},
  {name:'OMEGA-3', color:VIOLET, val:2},
];
function spawnSupp(){
  const s = SUPP_TYPES[Math.floor(Math.random()*SUPP_TYPES.length)];
  // place supplements along the shooting lane, but away from the rim column
  const lane = Math.random();
  let zPos;
  if (lane < 0.5) zPos = 2 + Math.random()*5;       // close half (in front of player)
  else            zPos = -2 - Math.random()*5;      // far half (between player and rim, not at rim)
  game.supps.push({
    type:s,
    x: (Math.random()-0.5)*9,
    y: 2 + Math.random()*4.5,
    z: zPos,
    rot:Math.random()*Math.PI*2,
    bob:Math.random()*Math.PI*2,
    alive:true
  });
}
for (let i=0;i<6;i++) spawnSupp();

// === input ===
addEventListener('mousemove', e => { game.mouseX = (e.clientX/innerWidth)*2-1; game.mouseY = -(e.clientY/innerHeight)*2+1; });
addEventListener('mousedown', () => { if (!game.running || game.ball.flying) return; game.charging=true; game.power=0; });
addEventListener('mouseup',   () => { if (!game.charging) return; game.charging=false; shoot(); });

function computeVel(){
  // mouseY = 0 (center screen) aims AT rim; up = higher arc, down = lower
  const aimX = game.mouseX * 3.5;
  const aimY = game.mouseY * 2.2;        // small range -> easy to hit
  const target = { x:RIM.x+aimX, y:RIM.y+aimY, z:RIM.z };
  // power controls travel time only; arc determined by target+gravity
  const power = 0.5 + game.power*0.8;
  const g = 18;
  const t = 1.1 / power;
  return {
    vx: (target.x - game.ball.x)/t,
    vy: (target.y - game.ball.y)/t + 0.5*g*t,
    vz: (target.z - game.ball.z)/t
  };
}

function shoot(){
  const v = computeVel();
  game.ball.vx = v.vx; game.ball.vy = v.vy; game.ball.vz = v.vz;
  game.ball.flying = true;
  game.ball.passedAbove = false;
  game.trail.length = 0;
}

function resetBall(){
  Object.assign(game.ball, BALL_START, {px:BALL_START.x,py:BALL_START.y,pz:BALL_START.z,vx:0,vy:0,vz:0,flying:false});
  game.trail.length = 0;
}

function toast(msg, color='#fff'){
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.color = color; el.style.opacity = 1;
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>el.style.opacity=0, 900);
}

function onBasket(){
  const g = 100*game.combo;
  game.score += g;
  document.getElementById('sv').textContent = game.score;
  game.popups.push({text:'+'+g, x:RIM.x, y:RIM.y+1, z:RIM.z, life:1.2, vy:0.05, color:GOLD});
  toast(game.combo>=8?'INSANE!':game.combo>=5?'FIRE!':game.combo>=3?'NICE!':'SWISH!', game.combo>=5?HOT:GOLD);
  camShake = 0.4;
  for (let i=0;i<30;i++){
    game.sparks.push({
      x:RIM.x, y:RIM.y, z:RIM.z,
      vx:(Math.random()-0.5)*8, vy:Math.random()*7+2, vz:(Math.random()-0.5)*8,
      life:1.2, color:[GOLD,HOT,ORANGE,AMBER][Math.floor(Math.random()*4)]
    });
  }
  game.ball.flying = false;
  setTimeout(resetBall, 700);
}

function step(dt){
  if (!game.running) return;
  game.time -= dt;
  if (game.time<=0){ game.time=0; game.running=false; endGame(); }
  document.getElementById('tv').textContent = Math.ceil(game.time);

  if (game.charging){
    game.power = Math.min(1, game.power + dt*0.85);
    document.getElementById('powerfill').style.width = (game.power*100)+'%';
  } else {
    document.getElementById('powerfill').style.width = '0%';
  }

  // ball physics
  const b = game.ball;
  if (b.flying){
    const g = 18;
    b.px = b.x; b.py = b.y; b.pz = b.z;
    b.vy -= g*dt;
    b.x += b.vx*dt; b.y += b.vy*dt; b.z += b.vz*dt;
    b.rot += dt*4;
    game.trail.push([b.x,b.y,b.z]); if (game.trail.length>40) game.trail.shift();

    // === rim plane crossing (y = RIM.y), descending ===
    if (b.py > RIM.y && b.y <= RIM.y && b.vy < 0){
      const a = (b.py - RIM.y) / (b.py - b.y);  // 0..1 fraction along the step
      const cx = b.px + (b.x - b.px)*a;
      const cz = b.pz + (b.z - b.pz)*a;
      const horiz = Math.hypot(cx - RIM.x, cz - RIM.z);
      if (horiz < RIM.r * 1.05) {       // generous: inside or just-touching the ring => score
        onBasket();
      } else if (horiz < RIM.r * 1.6) { // hit the rim => bounce
        const nx = (cx - RIM.x)/horiz, nz = (cz - RIM.z)/horiz;
        b.x = RIM.x + nx*RIM.r*1.1; b.z = RIM.z + nz*RIM.r*1.1; b.y = RIM.y + 0.05;
        const inward = b.vx*nx + b.vz*nz;
        b.vx -= 1.6*inward*nx; b.vz -= 1.6*inward*nz;
        b.vx *= 0.7; b.vz *= 0.7;
        b.vy = Math.abs(b.vy)*0.5;
      }
    }
    // backboard (only behind the rim)
    if (b.z < RIM.z - 0.05 && Math.abs(b.x-RIM.x)<2.2 && b.y > RIM.y-0.2 && b.y < RIM.y+2.2 && b.vz<0){
      b.z = RIM.z - 0.05; b.vz = -b.vz*0.55;
    }
    if (b.y < 0.4){
      b.y = 0.4;
      if (Math.hypot(b.vx,b.vy,b.vz) < 2){ b.vx=b.vy=b.vz=0; b.flying=false; setTimeout(resetBall,600); }
      else { b.vy = Math.abs(b.vy)*0.55; b.vx*=0.7; b.vz*=0.7; }
    }
    if (Math.abs(b.x)>30 || Math.abs(b.z)>30){ b.flying=false; resetBall(); }

    // collect supplements
    for (const s of game.supps){
      if (!s.alive) continue;
      const d = Math.hypot(b.x-s.x, b.y-s.y, b.z-s.z);
      if (d<0.95){
        s.alive=false;
        game.combo = Math.min(99, game.combo + s.type.val);
        document.getElementById('cv').textContent = 'x'+game.combo;
        game.popups.push({text:'+'+s.type.val+' '+s.type.name, x:s.x, y:s.y+0.5, z:s.z, life:1.2, vy:0.05, color:s.type.color});
        for (let i=0;i<8;i++) game.sparks.push({x:s.x,y:s.y,z:s.z,vx:(Math.random()-0.5)*4,vy:Math.random()*4+1,vz:(Math.random()-0.5)*4,life:1.0,color:s.type.color});
        setTimeout(spawnSupp, 700+Math.random()*1000);
      }
    }
  }

  // supplements
  for (const s of game.supps){
    if (!s.alive) continue;
    s.rot += dt*1.2; s.bob += dt*2;
    s.y += Math.sin(s.bob)*0.004;
  }
  // popups
  for (const p of game.popups){ p.y += p.vy; p.life -= dt; }
  game.popups = game.popups.filter(p=>p.life>0);
  // sparks
  for (const s of game.sparks){
    s.x += s.vx*dt; s.y += s.vy*dt; s.z += s.vz*dt;
    s.vy -= 14*dt; s.life -= dt;
  }
  game.sparks = game.sparks.filter(s=>s.life>0);

  camSwayT += dt*0.4;
  if (camShake>0) camShake = Math.max(0, camShake - dt*1.5);
}

function drawText3(text, x,y,z, color, size=28){
  const p = proj(x,y,z); if (!p) return;
  ctx.globalAlpha = 1;
  ctx.fillStyle = color;
  ctx.shadowColor = color; ctx.shadowBlur = 18;
  const s = Math.max(8, size * p[2] * 0.04 * devicePixelRatio);
  ctx.font = 'bold '+s+'px Arial Black, sans-serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text, p[0], p[1]);
  ctx.shadowBlur = 0;
}

function render(){
  // background gradient
  const grad = ctx.createRadialGradient(W/2, H*0.6, 0, W/2, H*0.6, H);
  grad.addColorStop(0,'#0a0a1a');
  grad.addColorStop(1,'#03040a');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // stars (procedural)
  ctx.fillStyle = '#ffe28a';
  ctx.globalAlpha = 0.6;
  for (let i=0;i<160;i++){
    const sx = ((i*9301 + 49297) % 233280) / 233280 * W;
    const sy = ((i*4567 + 12345) % 233280) / 233280 * H * 0.55;
    ctx.fillRect(sx, sy, devicePixelRatio, devicePixelRatio);
  }
  ctx.globalAlpha = 1;

  // ground concentric rings
  const t = performance.now()*0.001;
  for (let r=3; r<=22; r+=2.5){
    const pulse = 0.25 + Math.abs(Math.sin(t*1.5 + r*0.3))*0.35;
    circle3(0,0,0, r*(1+Math.sin(t*2+r*0.4)*0.02), 'y', r%5===0?HOT:AMBER, 48, pulse, 1.5);
  }
  // radial spokes
  for (let i=0;i<24;i++){
    const a = i/24*Math.PI*2;
    line3([Math.cos(a)*3,0.02,Math.sin(a)*3], [Math.cos(a)*22,0.02,Math.sin(a)*22], ORANGE, 1, 0.2);
  }
  // center logo
  circle3(0,0.04,0, 2.7, 'y', GOLD, 48, 0.9, 2);
  circle3(0,0.05,0, 0.5 + Math.sin(t*5)*0.1, 'y', HOT, 32, 1, 2);
  for (let i=0;i<12;i++){
    const a=i/12*Math.PI*2 + t*0.3;
    line3([Math.cos(a)*0.5,0.03,Math.sin(a)*0.5], [Math.cos(a)*2.5,0.03,Math.sin(a)*2.5], HOT, 1, 0.6);
  }

  // city skyline far ring
  for (let i=0;i<36;i++){
    const a = i/36*Math.PI*2;
    const h = 1.5 + ((i*7331)%100)/100*5;
    const x = Math.cos(a)*32, z = Math.sin(a)*32;
    box3(x, h/2, z, 0.7, h/2, 0.7, -a, i%3===0?VIOLET:CYAN, 0.5, 1);
  }

  // dome wireframe
  for (let lat=1; lat<=5; lat++){
    const phi = lat/6 * Math.PI/2;
    const r = Math.cos(phi)*24;
    const y = Math.sin(phi)*24;
    circle3(0,y,0, r, 'y', ORANGE, 48, 0.18, 1);
  }
  for (let lon=0; lon<12; lon++){
    const a = lon/12*Math.PI*2 + t*0.05;
    let prev=null;
    for (let lat=0;lat<=10;lat++){
      const phi = lat/10 * Math.PI/2;
      const r = Math.cos(phi)*24;
      const y = Math.sin(phi)*24;
      const p = [Math.cos(a)*r, y, Math.sin(a)*r];
      if (prev) line3(prev,p,ORANGE,1,0.16);
      prev = p;
    }
  }

  // floating sky hoops
  for (let i=0;i<5;i++){
    const r = 8 + i*2.5;
    const y = 8 + i*2.2 + Math.sin(t*0.8+i)*0.4;
    const c = [CYAN,VIOLET,GOLD,HOT,ORANGE][i];
    circle3(0,y,0, r, 'y', c, 48, 0.35, 1.5);
  }

  // === hoop ===
  // pole
  box3(0, 3, -10.8, 0.13, 3.5, 0.13, 0, AMBER, 0.85, 2);
  line3([0,6.4,-10.8],[0,6.4,-10.4], AMBER, 2, 0.85);
  // backboard
  box3(0, 7.4, -10.4, 2.25, 1.5, 0.05, 0, HOT, 1, 2);
  // outer glow
  box3(0, 7.4, -10.42, 2.45, 1.7, 0.04, 0, ORANGE, 0.5, 1);
  // inner target square
  box3(0, 7.2, -10.34, 0.8, 0.6, 0.03, 0, GOLD, 1, 2);
  // VITALABO text on board
  drawText3('VITALABO', 0, 8.0, -10.33, ORANGE, 80);
  drawText3('FUEL YOUR GAME', 0, 6.55, -10.33, GOLD, 36);
  // rim (with pulse)
  const rimPulse = 1 + Math.sin(t*3)*0.04;
  circle3(RIM.x, RIM.y, RIM.z, RIM.r*rimPulse, 'y', HOT, 32, 1, 2.5);
  circle3(RIM.x, RIM.y, RIM.z, RIM.r*1.18, 'y', GOLD, 32, 0.4, 1.5);
  circle3(RIM.x, RIM.y, RIM.z, RIM.r*1.45, 'y', ORANGE, 32, 0.2, 1);
  // net
  const NETSEGS=14;
  for (let i=0;i<NETSEGS;i++){
    const a = i/NETSEGS*Math.PI*2;
    const x1 = RIM.x+Math.cos(a)*RIM.r, z1 = RIM.z+Math.sin(a)*RIM.r;
    const x2 = RIM.x+Math.cos(a)*RIM.r*0.45, z2 = RIM.z+Math.sin(a)*RIM.r*0.45;
    line3([x1,RIM.y,z1],[x2,RIM.y-1.0,z2], AMBER, 1.5, 0.7);
  }
  for (let r=1;r<=3;r++){
    const ry = RIM.y - 1.0*(r/3);
    const rad = RIM.r*(1-r/4);
    circle3(RIM.x, ry, RIM.z, rad, 'y', AMBER, 16, 0.65, 1.2);
  }

  // === supplements ===
  for (const s of game.supps){
    if (!s.alive) continue;
    // wireframe octahedron-ish: 6 vertices
    const r = 0.45;
    const cos=Math.cos(s.rot), sin=Math.sin(s.rot);
    const v = [
      [s.x, s.y+r, s.z],
      [s.x, s.y-r, s.z],
      [s.x+r*cos, s.y, s.z+r*sin],
      [s.x-r*cos, s.y, s.z-r*sin],
      [s.x-r*sin, s.y, s.z+r*cos],
      [s.x+r*sin, s.y, s.z-r*cos],
    ];
    const edges = [[0,2],[0,3],[0,4],[0,5],[1,2],[1,3],[1,4],[1,5],[2,4],[4,3],[3,5],[5,2]];
    for (const [i,j] of edges) line3(v[i],v[j], s.type.color, 1.8, 1);
    // halo
    circle3(s.x, s.y, s.z, 0.8, 'y', s.type.color, 16, 0.3, 1);
    // label
    drawText3(s.type.name, s.x, s.y-0.8, s.z, s.type.color, 18);
  }

  // === ball trail ===
  for (let i=1;i<game.trail.length;i++){
    const a = i/game.trail.length;
    line3(game.trail[i-1], game.trail[i], HOT, 2, a*0.7);
  }

  // === ball ===
  const b = game.ball;
  const br = 0.42;
  // wireframe sphere via 3 rings + 4 great circles
  const rot = b.rot;
  // ring around Y
  let prev=null;
  for (let i=0;i<=20;i++){
    const a=i/20*Math.PI*2;
    const p = [b.x+Math.cos(a)*br, b.y, b.z+Math.sin(a)*br];
    if (prev) line3(prev,p,ORANGE,2,1);
    prev=p;
  }
  // ring around X
  prev=null;
  for (let i=0;i<=20;i++){
    const a=i/20*Math.PI*2;
    const p = [b.x, b.y+Math.cos(a)*br, b.z+Math.sin(a)*br];
    if (prev) line3(prev,p,HOT,2,1);
    prev=p;
  }
  // ring around Z
  prev=null;
  for (let i=0;i<=20;i++){
    const a=i/20*Math.PI*2;
    const p = [b.x+Math.cos(a+rot)*br, b.y+Math.sin(a+rot)*br, b.z];
    if (prev) line3(prev,p,HOT,2,1);
    prev=p;
  }
  // tilted seam
  prev=null;
  for (let i=0;i<=20;i++){
    const a=i/20*Math.PI*2;
    const p = [b.x+Math.cos(a)*br*0.7, b.y+Math.sin(a)*br*0.7, b.z+Math.cos(a)*br*0.7];
    if (prev) line3(prev,p,GOLD,1.5,0.7);
    prev=p;
  }

  // === aim preview ===
  if (game.charging){
    const v = computeVel();
    let px=b.x, py=b.y, pz=b.z;
    let pp=[px,py,pz];
    const g=18;
    for (let i=0;i<50;i++){
      const dt2 = 0.04;
      px += v.vx*dt2; py += v.vy*dt2; pz += v.vz*dt2;
      v.vy -= g*dt2;
      if (py<0.3) break;
      if (i%2===0) line3(pp,[px,py,pz], GOLD, 2, 0.7 - i*0.012);
      pp=[px,py,pz];
    }
  }

  // === sparks ===
  for (const s of game.sparks){
    line3([s.x,s.y,s.z],[s.x,s.y+0.4,s.z], s.color, 2, Math.max(0,s.life));
  }

  // === popups ===
  for (const p of game.popups){
    const pr = proj(p.x,p.y,p.z); if (!pr) continue;
    ctx.globalAlpha = Math.max(0,p.life);
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 22;
    const sz = Math.max(16, 40*pr[2]*0.03*devicePixelRatio);
    ctx.font = 'bold '+sz+'px Arial Black, sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(p.text, pr[0], pr[1]);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // scanlines
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#fff';
  for (let y=0;y<H;y+=4) ctx.fillRect(0,y,W,1);
  ctx.globalAlpha = 1;
}

function endGame(){
  toast('GAME OVER  '+game.score, GOLD);
  // overlay
  const ov = document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:radial-gradient(circle,rgba(255,61,0,.2),rgba(3,4,10,.95));display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:99;font-family:Arial Black,sans-serif;color:#fff;text-align:center';
  const rank = game.score>=2000?'LEGENDARY':game.score>=1200?'ELITE ATHLETE':game.score>=500?'SOLID PERFORMANCE':'KEEP TRAINING';
  ov.innerHTML = `<div style="font-size:96px;letter-spacing:14px;text-shadow:0 0 24px ${ORANGE},0 0 60px ${HOT}">${game.score}</div>
    <div style="color:${AMBER};letter-spacing:8px;margin:8px 0 4px">// FINAL SCORE //</div>
    <div style="color:${CYAN};letter-spacing:6px;margin-bottom:30px;font-family:Courier New">${rank}</div>
    <div style="color:#9af;font-family:Courier New;letter-spacing:2px;margin-bottom:30px">Max Combo: <span style="color:${ORANGE}">x${game.combo}</span> &nbsp;|&nbsp; Powered by <span style="color:${ORANGE}">VITALABO</span></div>
    <button id="rb" style="background:transparent;border:2px solid ${AMBER};color:#fff;padding:18px 56px;font-size:18px;letter-spacing:6px;cursor:pointer;font-family:inherit;box-shadow:0 0 30px rgba(255,122,24,.5)">PLAY AGAIN</button>`;
  document.body.appendChild(ov);
  ov.querySelector('#rb').onclick = ()=>{ ov.remove(); game.score=0; game.combo=1; game.time=60; game.running=true; document.getElementById('sv').textContent=0; document.getElementById('cv').textContent='x1'; game.supps.forEach(s=>s.alive=false); for(let i=0;i<6;i++) spawnSupp(); resetBall(); };
}

let lastT = performance.now();
function loop(){
  const now = performance.now();
  const dt = Math.min(0.05, (now-lastT)/1000);
  lastT = now;
  step(dt);
  render();
  requestAnimationFrame(loop);
}
loop();
})();
</script>
</body>
</html>
